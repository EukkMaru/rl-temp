"source":104,"target":105},{"source":104,"target":106},{"source":104,"target":107},{"source":105,"target":69},{"source":105,"target":94},{"source":105,"target":103},{"source":105,"target":104},{"source":105,"target":106},{"source":105,"target":107},{"source":106,"target":69},{"source":106,"target":94},{"source":106,"target":103},{"source":106,"target":104},{"source":106,"target":105},{"source":106,"target":107},{"source":107,"target":69},{"source":107,"target":94},{"source":107,"target":103},{"source":107,"target":104},{"source":107,"target":105},{"source":107,"target":106}];
    const modeColors = {"0":"#9ca3af","1":"#5b8bd9","2":"#78a96b","3":"#d89c52"};
    const modeLabels = {"0":"Idle","1":"Short","2":"Medium","3":"Long"};

    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d");
    const legend = document.getElementById("legend");

    for (const mode of ["0", "1", "2", "3"]) {
      const item = document.createElement("div");
      item.className = "item";
      const dot = document.createElement("span");
      dot.className = "dot";
      dot.style.background = modeColors[mode];
      const text = document.createElement("span");
      text.textContent = modeLabels[mode];
      item.append(dot, text);
      legend.appendChild(item);
    }

    let width = 0;
    let height = 0;
    let yaw = -0.72;
    let pitch = 0.58;
    let zoom = 185;
    let dragging = false;
    let lastX = 0;
    let lastY = 0;

    const center = { x: 1, y: 1, z: 1 };

    function resize() {
      const scale = window.devicePixelRatio || 1;
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * scale);
      canvas.height = Math.floor(height * scale);
      ctx.setTransform(scale, 0, 0, scale, 0, 0);
      draw();
    }

    function hexToRgba(hex, alpha) {
      const n = parseInt(hex.slice(1), 16);
      const r = (n >> 16) & 255;
      const g = (n >> 8) & 255;
      const b = n & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function project(point) {
      let x = point.x - center.x;
      let y = point.y - center.y;
      let z = point.z - center.z;

      const cy = Math.cos(yaw);
      const sy = Math.sin(yaw);
      const cp = Math.cos(pitch);
      const sp = Math.sin(pitch);

      const x1 = x * cy - z * sy;
      const z1 = x * sy + z * cy;
      const y1 = y * cp - z1 * sp;
      const z2 = y * sp + z1 * cp;

      const perspective = 1 / (1 + z2 * 0.22);
      return {
        x: width / 2 + x1 * zoom * perspective,
        y: height / 2 - y1 * zoom * perspective,
        z: z2,
        scale: perspective,
      };
    }

    function drawAxis() {
      const origin = project({x: -0.25, y: -0.25, z: -0.25});
      const axes = [
        [{x: 2.45, y: -0.25, z: -0.25}, "qS"],
        [{x: -0.25, y: 2.45, z: -0.25}, "qM"],
        [{x: -0.25, y: -0.25, z: 2.45}, "qL"],
      ];
      ctx.lineWidth = 1.8;
      ctx.strokeStyle = "rgba(60, 60, 60, 0.55)";
      ctx.fillStyle = "rgba(40, 40, 40, 0.75)";
      ctx.font = "16px Arial";
      for (const [endPoint, label] of axes) {
        const end = project(endPoint);
        ctx.beginPath();
        ctx.moveTo(origin.x, origin.y);
        ctx.lineTo(end.x, end.y);
        ctx.stroke();
        ctx.fillText(label, end.x + 8, end.y + 4);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, width, height);

      const projected = nodes.map(project);
      drawAxis();

      ctx.lineWidth = 1.1;
      for (const edge of edges) {
        const a = projected[edge.source];
        const b = projected[edge.target];
        ctx.strokeStyle = "rgba(55, 65, 80, 0.20)";
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }

      const order = nodes.map((node, index) => [node, projected[index], index]).sort((a, b) => a[1].z - b[1].z);
      for (const [node, p] of order) {
        const radius = 7.5 * p.scale + 2;
        ctx.beginPath();
        ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
        ctx.fillStyle = hexToRgba(modeColors[node.mode], 0.95);
        ctx.fill();
        ctx.strokeStyle = "rgba(25, 25, 25, 0.85)";
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    canvas.addEventListener("mousedown", (event) => {
      dragging = true;
      lastX = event.clientX;
      lastY = event.clientY;
    });
    window.addEventListener("mouseup", () => dragging = false);
    window.addEventListener("mousemove", (event) => {
      if (!dragging) return;
      yaw += (event.clientX - lastX) * 0.008;
      pitch += (event.clientY - lastY) * 0.008;
      pitch = Math.max(-1.25, Math.min(1.25, pitch));
      lastX = event.clientX;
      lastY = event.clientY;
      draw();
    });
    canvas.addEventListener("wheel", (event) => {
      event.preventDefault();
      zoom *= event.deltaY > 0 ? 0.92 : 1.08;
      zoom = Math.max(80, Math.min(420, zoom));
      draw();
    }, { passive: false });

    window.addEventListener("resize", resize);
    resize();
